services:
  - type: web
    name: fsreg-teaching-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: fsreg-data
      mountPath: /opt/render/project/src/教学系统
      sizeGB: 1
