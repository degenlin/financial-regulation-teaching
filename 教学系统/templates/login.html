{% extends "base.html" %}
{% block title %}登录 - 金融监管教学实验系统{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background:linear-gradient(135deg,#1a3a6b 0%,#2e75b6 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <i class="fas fa-university fa-3x text-white mb-2"></i>
          <h3 class="text-white fw-bold">金融监管教学实验系统</h3>
          <p class="text-white-50 small">基于王娴《金融监管理论与实践》</p>
        </div>
        <div class="card shadow-lg p-4">
          <h5 class="mb-3 fw-bold" style="color:#1a3a6b"><i class="fas fa-sign-in-alt me-2"></i>账号登录</h5>
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">用户名</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">密码</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
              </div>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg fw-bold" style="background:#1a3a6b;border-color:#1a3a6b">
                <i class="fas fa-sign-in-alt me-2"></i>登 录
              </button>
            </div>
          </form>
          <hr>
          <div class="text-center">
            <span class="text-muted small">没有账号？</span>
            <a href="/register" class="small ms-1">立即注册</a>
          </div>
        </div>
        <p class="text-center text-white-50 small mt-3">
          教师账号：teacher / teacher123
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
