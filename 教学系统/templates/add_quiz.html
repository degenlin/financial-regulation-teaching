{% extends "base.html" %}
{% block title %}添加题目{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="d-flex align-items-center mb-3">
        <a href="/teacher" class="btn btn-outline-secondary btn-sm me-3">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="fw-bold mb-0" style="color:#1a3a6b">
          <i class="fas fa-plus-circle me-2"></i>添加测验题目
        </h5>
      </div>
      <div class="card">
        <div class="card-header fw-bold" style="background:#1a3a6b;color:#fff">
          新建单选题
        </div>
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">所属章节 <span class="text-danger">*</span></label>
              <select name="chapter_id" class="form-select" required>
                {% for ch in chapters %}
                <option value="{{ ch.id }}">第{{ ch.num }}章 · {{ ch.title }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">题目 <span class="text-danger">*</span></label>
              <textarea name="question" class="form-control" rows="2"
                        placeholder="请输入题目内容" required></textarea>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">选项A <span class="text-danger">*</span></label>
                <input type="text" name="option_a" class="form-control" placeholder="A选项" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">选项B <span class="text-danger">*</span></label>
                <input type="text" name="option_b" class="form-control" placeholder="B选项" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">选项C</label>
                <input type="text" name="option_c" class="form-control" placeholder="C选项（可选）">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">选项D</label>
                <input type="text" name="option_d" class="form-control" placeholder="D选项（可选）">
              </div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">正确答案 <span class="text-danger">*</span></label>
                <select name="answer" class="form-select" required>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                  <option value="D">D</option>
                </select>
              </div>
              <div class="col-md-8">
                <label class="form-label fw-semibold">解析说明（选填）</label>
                <input type="text" name="explanation" class="form-control" placeholder="答题解析">
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn fw-bold text-white px-5" style="background:#1a3a6b">
                <i class="fas fa-plus me-2"></i>添加题目
              </button>
              <a href="/teacher" class="btn btn-outline-secondary">返回</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
